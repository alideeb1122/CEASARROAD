kind = "web"
previewPath = "/"
title = "Caesar Road Travel & Tourism"
version = "1.0.0"
id = "artifacts/website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/website", "run", "build" ]
publicDir = "artifacts/website/out"
serve = "static"

[services.env]
PORT = "3000"
